<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Karty Binarne z Systemem Dwójkowym</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            padding-top: 50px;
            color: #333;
        }
 
        .container {
            display: flex;
            /* Flex-direction row sprawia, że 128 jest po lewej, a 1 po prawej */
            flex-direction: row;
            gap: 12px;
            margin-bottom: 30px;
        }
 
        .karta {
            width: 85px;
            height: 130px;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
 
        /* Styl dla karty "odwróconej" (0) */
        .karta.ukryta {
            background-color: #2c3e50;
        }
 
        .karta.ukryta .kropki, .karta.ukryta .wartosc {
            visibility: hidden;
        }
 
        .kropki {
            font-size: 22px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
        }
 
        .wartosc {
            font-weight: bold;
            font-size: 18px;
            border-top: 1px solid #eee;
            width: 100%;
            text-align: center;
            padding-top: 5px;
        }
 
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 300px;
        }
 
        .wynik, .binarny {
            font-size: 22px;
            margin: 10px 0;
        }
 
        .binarny span {
            color: #e74c3c;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 4px;
            font-size: 28px;
        }
    </style>
</head>
<body>
 <a href="index.html">Powrót do strony głównej</a><br><br>
    <h1>Karty binarne</h1>
 
    <div class="container">
        <div class="karta" data-value="128" onclick="przelacz(this)">
            <div class="kropki">128</div>
            <div class="wartosc">128</div>
        </div>
        <div class="karta" data-value="64" onclick="przelacz(this)">
            <div class="kropki">64</div>
            <div class="wartosc">64</div>
        </div>
        <div class="karta" data-value="32" onclick="przelacz(this)">
            <div class="kropki">32</div>
            <div class="wartosc">32</div>
        </div>
        <div class="karta" data-value="16" onclick="przelacz(this)">
            <div class="kropki">16</div>
            <div class="wartosc">16</div>
        </div>
        <div class="karta" data-value="8" onclick="przelacz(this)">
            <div class="kropki">8</div>
            <div class="wartosc">8</div>
        </div>
        <div class="karta" data-value="4" onclick="przelacz(this)">
            <div class="kropki">4</div>
            <div class="wartosc">4</div>
        </div>
        <div class="karta" data-value="2" onclick="przelacz(this)">
            <div class="kropki">2</div>
            <div class="wartosc">2</div>
        </div>
        <div class="karta" data-value="1" onclick="przelacz(this)">
            <div class="kropki">1</div>
            <div class="wartosc">1</div>
        </div>
    </div>
 
    <div class="info-panel">
        <div class="wynik">Liczba kropek: <strong id="suma">255</strong></div>
        <div class="binarny">Binarny: <span id="kod-binarny">11111111</span></div>
    </div>
 
    <script>
        function przelacz(element) {
            // Przełącz klasę ukrycia
            element.classList.toggle('ukryta');
            
            aktualizuj();
        }
 
        function aktualizuj() {
            let suma = 0;
            let binarny = "";
            
            // Pobieramy wszystkie karty w kolejności występowania w HTML
            const karty = document.querySelectorAll('.karta');
            
            karty.forEach(karta => {
                const wartosc = parseInt(karta.getAttribute('data-value'));
                
                if (karta.classList.contains('ukryta')) {
                    binarny += "0";
                } else {
                    binarny += "1";
                    suma += wartosc;
                }
            });
 
            // Wpisujemy wyniki w odpowiednie miejsca
            document.getElementById('suma').innerText = suma;
            document.getElementById('kod-binarny').innerText = binarny;
        }
    </script>
 
</body>
</html>
